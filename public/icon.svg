<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="128" fill="#1A1A1A"/>
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#F27D26" stroke-width="2" stroke-opacity="0.1" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FDFCFB" stroke-width="1.5" stroke-opacity="0.1" stroke-dasharray="8 6" />

  <!-- The "L" Nib monogram -->
  <g transform="translate(116, 100)">
    <!-- Nib Body (Ivory) -->
    <path d="M 140 20 C 120 110, 110 160, 50 210 L 50 260 L 230 260 L 230 210 C 170 160, 160 110, 140 20 Z" fill="#FDFCFB" />
    
    <!-- Terracotta Base Plate -->
    <path d="M 50 210 Q 90 240, 140 240 Q 190 240, 230 210 L 230 260 L 50 260 Z" fill="#F27D26" />
    
    <!-- Central slit and breather hole -->
    <circle cx="140" cy="140" r="12" fill="#1A1A1A" />
    <path d="M 140 152 L 140 260" stroke="#1A1A1A" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 140 20 L 140 128" stroke="#1A1A1A" stroke-width="2" />
  </g>

  <!-- Star sparkle decoration -->
  <path d="M 370 120 Q 370 145, 395 145 Q 370 145, 370 170 Q 370 145, 345 145 Q 370 145, 370 120 Z" fill="#F27D26" />
  <path d="M 130 360 Q 130 375, 145 375 Q 130 375, 130 390 Q 130 375, 115 375 Q 130 375, 130 360 Z" fill="#FDFCFB" opacity="0.6" />
</svg>
